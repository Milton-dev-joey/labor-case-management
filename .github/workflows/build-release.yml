name: Build Windows App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build portable exe
        run: npx electron-builder --win portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-exe
          path: |
            dist/*.exe
            dist/latest.yml
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 劳动案件管理系统 ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/latest.yml
          draft: false
          prerelease: false
          body: |
            ## 劳动案件管理系统 ${{ github.ref_name }}

            ### 下载安装
            点击下方 `劳动案件管理系统-*-portable.exe` 文件下载，双击即可运行，**无需安装**。

            > 首次运行时 Windows 可能弹出安全提示，点击「更多信息」→「仍要运行」即可。

            ### 系统要求
            - Windows 10 / 11（64 位）
            - 无需安装 Python、Node.js 或其他运行时

            ### 数据说明
            所有案件数据保存在本地，位于：
            ```
            %APPDATA%\劳动案件管理系统\
            ```
            可定期备份该目录以防数据丢失。

            ### 自动更新
            应用启动时会自动检测新版本，发现更新后将提示下载并重启完成升级。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
